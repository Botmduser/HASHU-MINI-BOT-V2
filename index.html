<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HASHAN-MD MINI V2</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* Pure Dark Minimalist Background */
        body, html {
            background: #020202;
            color: #ffffff;
            height: 100%;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Luxury Gold Ambient Glow */
        .ambient-glow {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.05) 0%, rgba(0,0,0,0) 75%);
            z-index: 0;
            pointer-events: none;
        }

        .main-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1;
        }

        /* Ultra Premium Obsidian Card */
        .premium-card {
            background: rgba(10, 10, 10, 0.85);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(212, 175, 55, 0.12);
            padding: 50px 40px;
            border-radius: 28px;
            width: 90%;
            max-width: 430px;
            text-align: center;
            box-shadow: 0 40px 90px rgba(0, 0, 0, 0.9), 
                        inset 0 1px 0px rgba(255, 255, 255, 0.02);
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .premium-card.fade-out {
            opacity: 0;
            transform: scale(0.94) translateY(-15px);
            pointer-events: none;
        }

        /* Gold Ring Logo Container */
        .logo-container {
            margin-bottom: 30px;
        }

        .bot-logo {
            width: 80px;
            height: 80px;
            background: #050505;
            border: 1px solid rgba(212, 175, 55, 0.25);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
            box-shadow: 0 0 35px rgba(212, 175, 55, 0.08);
            position: relative;
        }

        .bot-logo::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 1px solid transparent;
            border-top-color: rgba(212, 175, 55, 0.4);
            animation: spin 4s linear infinite;
        }

        .bot-logo svg {
            width: 38px;
            height: 38px;
            fill: #d4af37;
        }

        /* Typography */
        h1 {
            font-size: 1.65rem;
            font-weight: 800;
            letter-spacing: 2px;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #ffffff 40%, #e5c060 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: #71717a;
            font-size: 0.9rem;
            line-height: 1.6;
            margin-bottom: 40px;
            letter-spacing: 0.3px;
        }

        /* Solid Dark Premium Button */
        .connect-btn {
            background: #020202;
            color: #d4af37;
            border: 1px solid rgba(212, 175, 55, 0.35);
            padding: 18px 32px;
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            border-radius: 16px;
            width: 100%;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            text-transform: uppercase;
        }

        .connect-btn:hover {
            background: #0a0a0a;
            border-color: #d4af37;
            color: #ffffff;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.15);
            transform: translateY(-2px);
        }

        /* Premium Shimmer Line */
        .connect-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.2), transparent);
            transition: 0.6s ease;
        }

        .connect-btn:hover::before {
            left: 100%;
        }

        /* Super High-End Loading Screen */
        .loading-container {
            position: absolute;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .loading-container.fade-in {
            display: flex;
            opacity: 1;
        }

        /* Advanced Dual-Ring Loading Spinner */
        .super-spinner {
            position: relative;
            width: 80px;
            height: 80px;
        }

        .spinner-outer {
            width: 100%;
            height: 100%;
            border: 3px solid transparent;
            border-top-color: #d4af37;
            border-bottom-color: #aa7c11;
            border-radius: 50%;
            animation: spin 1.2s cubic-bezier(0.5, 0.1, 0.1, 0.9) infinite;
        }

        .spinner-inner {
            position: absolute;
            top: 12px;
            left: 12px;
            right: 12px;
            bottom: 12px;
            border: 2px solid transparent;
            border-left-color: #ffffff;
            border-right-color: rgba(212, 175, 55, 0.4);
            border-radius: 50%;
            animation: spin-reverse 0.8s linear infinite;
        }

        .loading-text {
            margin-top: 25px;
            font-size: 0.75rem;
            color: #d4af37;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-weight: 600;
            animation: textPulse 1.8s ease-in-out infinite;
        }

        /* Full Screen Iframe Viewport */
        .bot-frame-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: none;
            opacity: 0;
            transition: opacity 0.8s ease;
            background: #020202;
        }

        .bot-frame-container.show {
            display: block;
            opacity: 1;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Animations Core */
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes spin-reverse {
            0% { transform: rotate(360deg); }
            100% { transform: rotate(0deg); }
        }

        @keyframes textPulse {
            0%, 100% { opacity: 0.3; transform: scale(0.98); }
            50% { opacity: 1; transform: scale(1); }
        }

        .footer-note {
            margin-top: 35px;
            font-size: 0.65rem;
            color: #2a2a2a;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="ambient-glow"></div>

    <div class="main-container">
        <!-- Main Card UI -->
        <div class="premium-card" id="cardUi">
            <div class="logo-container">
                <div class="bot-logo">
                    <svg viewBox="0 0 24 24">
                        <path d="M20,2H4C2.9,2,2,2.9,2,4v18l4-4h14c1.1,0,2-0.9,2-2V4C22,2.9,21.1,2,20,2z M12,14c-1.66,0-3-1.34-3-3s1.34-3,3-3 s3,1.34,3,3S13.66,14,12,14z"/>
                    </svg>
                </div>
            </div>
            
            <h1>HASHAN-MD MINI V2</h1>
            <p>Initialize your premium secure connection panel. Click below to retrieve your authentication pairing gateway.</p>
            
            <button class="connect-btn" id="connectBtn">Connect Now</button>
            
            <div class="footer-note">Secure Terminal</div>
        </div>

        <!-- Super Premium Loading Screen -->
        <div class="loading-container" id="loadingUi">
            <div class="super-spinner">
                <div class="spinner-outer"></div>
                <div class="spinner-inner"></div>
            </div>
            <div class="loading-text">Connecting to Server</div>
        </div>
    </div>

    <!-- Hidden Seamless Iframe Container -->
    <div class="bot-frame-container" id="frameContainer">
        <iframe src="https://gpt-mini-bot-production.up.railway.app/" id="botFrame"></iframe>
    </div>

    <script>
        document.getElementById('connectBtn').addEventListener('click', function() {
            const card = document.getElementById('cardUi');
            const loading = document.getElementById('loadingUi');
            const frameContainer = document.getElementById('frameContainer');

            // 1. Smoothly fade out the card
            card.classList.add('fade-out');

            // 2. Switch to the super premium loading spinner
            setTimeout(() => {
                card.style.display = 'none';
                loading.classList.add('fade-in');
            }, 500);

            // 3. Keep loading animation active for 3 seconds, then reveal the pairing web smoothly
            setTimeout(() => {
                loading.classList.remove('fade-in');
                setTimeout(() => {
                    loading.style.display = 'none';
                    frameContainer.classList.add('show');
                }, 400);
            }, 3200);
        });
    </script>
</body>
  </html>
