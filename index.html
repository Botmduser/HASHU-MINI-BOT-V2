<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HASHAN-MD MINI V2</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        /* Full Screen Fit & Dark Theme */
        body, html {
            background: #020202;
            color: #ffffff;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Enhanced Cyber Gold Glow */
        .ambient-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.08) 0%, rgba(0,0,0,0) 70%);
            z-index: 0;
            pointer-events: none;
            animation: pulseGlow 8s ease-in-out infinite alternate;
        }

        .main-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1;
            padding: 20px;
        }

        /* Ultra Premium Futuristic Card */
        .premium-card {
            background: rgba(8, 8, 8, 0.75);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(212, 175, 55, 0.18);
            padding: 45px 35px;
            border-radius: 30px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.8), 
                        0 0 40px rgba(212, 175, 55, 0.03),
                        inset 0 1px 1px rgba(255, 255, 255, 0.03);
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .premium-card.fade-out {
            opacity: 0;
            transform: scale(0.92) translateY(-20px);
            pointer-events: none;
        }

        /* Neon Rotating Logo */
        .logo-container {
            margin-bottom: 25px;
        }

        .bot-logo {
            width: 85px;
            height: 85px;
            background: #050505;
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.1);
            position: relative;
        }

        .bot-logo::after {
            content: '';
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            border-radius: 50%;
            border: 2px solid transparent;
            border-top-color: #d4af37;
            border-bottom-color: #d4af37;
            animation: spin 3s cubic-bezier(0.68, -0.55, 0.27, 1.55) infinite;
        }

        .bot-logo svg {
            width: 40px;
            height: 40px;
            fill: url(#gold-gradient);
            filter: drop-shadow(0 2px 8px rgba(212, 175, 55, 0.3));
        }

        /* Typography */
        h1 {
            font-size: 1.8rem;
            font-weight: 900;
            letter-spacing: 3px;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #ffffff 30%, #f3d067 70%, #aa7c11 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 4px 12px rgba(0,0,0,0.5);
        }

        p {
            color: #a1a1aa;
            font-size: 0.9rem;
            line-height: 1.6;
            margin-bottom: 35px;
            letter-spacing: 0.4px;
            padding: 0 10px;
        }

        /* Neon Border Premium Button */
        .connect-btn {
            background: linear-gradient(135deg, #0a0a0a 0%, #121212 100%);
            color: #d4af37;
            border: 1px solid rgba(212, 175, 55, 0.4);
            padding: 18px 32px;
            font-size: 0.95rem;
            font-weight: 800;
            letter-spacing: 2px;
            border-radius: 18px;
            width: 100%;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        .connect-btn:hover {
            background: #d4af37;
            color: #000000;
            border-color: #d4af37;
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.35);
            transform: translateY(-3px);
        }

        .connect-btn:active {
            transform: translateY(-1px);
        }

        /* Shimmer Effect */
        .connect-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.3), transparent);
            transition: 0.5s ease;
        }

        .connect-btn:hover::before {
            left: 100%;
        }

        /* Premium Loading Screen */
        .loading-container {
            position: absolute;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .loading-container.fade-in {
            display: flex;
            opacity: 1;
        }

        /* Dual-Chamber Luxury Spinner */
        .super-spinner {
            position: relative;
            width: 90px;
            height: 90px;
        }

        .spinner-outer {
            width: 100%; height: 100%;
            border: 3px solid transparent;
            border-top-color: #d4af37;
            border-bottom-color: #d4af37;
            border-radius: 50%;
            animation: spin 1s cubic-bezier(0.42, 0, 0.58, 1) infinite;
        }

        .spinner-inner {
            position: absolute;
            top: 15px; left: 15px; right: 15px; bottom: 15px;
            border: 2px solid transparent;
            border-left-color: #ffffff;
            border-right-color: rgba(212, 175, 55, 0.3);
            border-radius: 50%;
            animation: spin-reverse 0.6s linear infinite;
        }

        .loading-text {
            margin-top: 30px;
            font-size: 0.8rem;
            color: #d4af37;
            letter-spacing: 5px;
            text-transform: uppercase;
            font-weight: 700;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.2);
            animation: textPulse 1.5s ease-in-out infinite;
        }

        /* Full Screen Fit Iframe Container */
        .bot-frame-container {
            position: absolute;
            top: 0; left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 10;
            display: none;
            opacity: 0;
            transition: opacity 0.8s ease;
            background: #020202;
        }

        .bot-frame-container.show {
            display: block;
            opacity: 1;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* Keyframes */
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes spin-reverse {
            0% { transform: rotate(360deg); }
            100% { transform: rotate(0deg); }
        }

        @keyframes pulseGlow {
            0% { opacity: 0.6; transform: scale(0.95); }
            100% { opacity: 1; transform: scale(1.05); }
        }

        @keyframes textPulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        .footer-note {
            margin-top: 30px;
            font-size: 0.7rem;
            color: #3f3f46;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <!-- SVG Gradients Reference -->
    <svg style="width:0;height:0;position:absolute;">
        <linearGradient id="gold-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#ffffff" />
            <stop offset="50%" stop-color="#d4af37" />
            <stop offset="100%" stop-color="#aa7c11" />
        </linearGradient>
    </svg>

    <div class="ambient-glow"></div>

    <div class="main-container">
        <!-- Main Card UI -->
        <div class="premium-card" id="cardUi">
            <div class="logo-container">
                <div class="bot-logo">
                    <svg viewBox="0 0 24 24">
                        <path d="M20,2H4C2.9,2,2,2.9,2,4v18l4-4h14c1.1,0,2-0.9,2-2V4C22,2.9,21.1,2,20,2z M12,14c-1.66,0-3-1.34-3-3s1.34-3,3-3 s3,1.34,3,3S13.66,14,12,14z"/>
                    </svg>
                </div>
            </div>
            
            <h1>HASHAN-MD MINI V2</h1>
            <p>Initialize your premium secure connection panel. Click below to retrieve your authentication pairing gateway.</p>
            
            <button class="connect-btn" id="connectBtn">Connect Now</button>
            
            <div class="footer-note">SECURE TERMINAL</div>
        </div>

        <!-- Premium Loading Screen -->
        <div class="loading-container" id="loadingUi">
            <div class="super-spinner">
                <div class="spinner-outer"></div>
                <div class="spinner-inner"></div>
            </div>
            <div class="loading-text">Connecting...</div>
        </div>
    </div>

    <!-- Screen Fit Hidden Iframe Container (No URL Change) -->
    <div class="bot-frame-container" id="frameContainer">
        <!-- New Updated URL Provided By User -->
        <iframe src="https://gpt-mini-bot-production-a373.up.railway.app/" id="botFrame" allow="clipboard-read; clipboard-write"></iframe>
    </div>

    <script>
        document.getElementById('connectBtn').addEventListener('click', function() {
            const card = document.getElementById('cardUi');
            const loading = document.getElementById('loadingUi');
            const frameContainer = document.getElementById('frameContainer');

            // 1. Fade out the setup card
            card.classList.add('fade-out');

            // 2. Show the premium loader
            setTimeout(() => {
                card.style.display = 'none';
                loading.classList.add('fade-in');
            }, 500);

            // 3. Smooth seamless transition to full screen iframe
            setTimeout(() => {
                loading.classList.remove('fade-in');
                setTimeout(() => {
                    loading.style.display = 'none';
                    frameContainer.classList.add('show');
                }, 400);
            }, 2500); // Optimized loading time
        });
    </script>
</body>
        </html>
